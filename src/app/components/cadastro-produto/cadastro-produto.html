<div class="cadastro-container">

  <h2>Cadastro de Produto</h2>

  <form>

    <div class="campo">
      <label for="clienteId">ID do Cliente</label>
      <input
        type="number"
        id="clienteId"
        name="clienteId"
        [(ngModel)]="produto.clienteId">
    </div>

    <div class="campo">
      <label for="descricao">Descrição</label>
      <input
        type="text"
        id="descricao"
        name="descricao"
        [(ngModel)]="produto.descricao">
    </div>

    <div class="campo">
      <label for="preco">Preço (R$)</label>
      <input
        type="number"
        id="preco"
        name="preco"
        step="0.01"
        min="0.01"
        [(ngModel)]="produto.preco">
    </div>

    <div class="campo">
      <label for="dataDeCadastro">Data de Cadastro</label>
      <input
        type="date"
        id="dataDeCadastro"
        name="dataDeCadastro"
        [(ngModel)]="produto.dataDeCadastro">
    </div>

    <div class="campo">
      <label for="tamanho">Tamanho</label>
      <input
        type="text"
        id="descricao"
        name="descricao"
        [(ngModel)]="produto.tamanho">
    </div>

    <div class="campo">
      <label for="genero">Gênero</label>
      <select
        id="genero"
        name="genero"
        [(ngModel)]="produto.genero">

        <option value="masculino">Masculino</option>
        <option value="feminino">Feminino</option>
        <option value="unissex">Unissex</option>
        <option value="infantil">Infantil</option>

      </select>
    </div>

    <div class="campo">
      <label for="faixaEtaria">Faixa Etária</label>
      <select
        id="faixaEtaria"
        name="faixaEtaria"
        [(ngModel)]="produto.faixaEtaria">

        <option [ngValue]="1">Recém-nascido (0–3 meses)</option>
        <option [ngValue]="2">Bebê (3–12 meses)</option>
        <option [ngValue]="3">Primeira infância (1–3 anos)</option>
        <option [ngValue]="4">Infantil (4–7 anos)</option>
        <option [ngValue]="5">Juvenil (8–14 anos)</option>
        <option [ngValue]="6">Adulto (15+ anos)</option>
    
      </select>
    </div>

    <div class="campo">
      <label for="status">Status</label>
      <select
        id="status"
        name="status"
        [(ngModel)]="produto.status">

      </select>
    </div>

<div class="campo">
  <label for="imagem">URL da Imagem (opcional)</label>

  <input
    type="text"
    id="imagem"
    name="imagem"
    placeholder="https://exemplo.com/imagem.jpg"
    [(ngModel)]="produto.imagem">
</div>


    <button
      type="button"
      (click)="cadastrar()">
      Cadastrar Produto
    </button>

  </form>

</div>
