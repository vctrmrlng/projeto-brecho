<header class="cadastro-header">
  <nav class="navbar">
    <a routerLink="/" class="logo">
      <img src="/imagens/logo.svg" alt="Segunda Chance">
    </a>
  </nav>
</header>

<main class="container"><main class="container">
  <div class="cadastro-container">
    <p class="cadastro-subtitle">PRODUTOS SEGUNDA CHANCE</p>
    <h2>Cadastro de Produto</h2>

    <form>
      <div class="campo">
        <label for="descricao">Descrição</label>
        <input type="text" id="descricao" name="descricao" [(ngModel)]="produto.descricao">
      </div>

      <div class="campo">
        <label for="preco">Preço (R$)</label>
        <input type="number" id="preco" name="preco" step="0.01" min="0.01" [(ngModel)]="produto.preco">
      </div>

      <div class="campo">
        <label for="tamanho">Tamanho</label>
        <input type="text" id="tamanho" name="tamanho" placeholder="Ex.: P, 38, 40, Único..." [(ngModel)]="produto.tamanho">
      </div>

      <div class="campo">
        <label for="genero">Gênero</label>
        <select id="genero" name="genero" [(ngModel)]="produto.genero">
          <option value="">Selecione...</option>
          <option value="Masculino">Masculino</option>
          <option value="Feminino">Feminino</option>
          <option value="Unissex">Unissex</option>
        </select>
      </div>

      <div class="campo">
        <label for="faixaEtaria">Faixa Etária</label>
        <select id="faixaEtaria" name="faixaEtaria" [(ngModel)]="produto.faixaEtaria">
          <option [ngValue]="0">Selecione...</option>
          <option [ngValue]="1">Recém-nascido (0–3 meses)</option>
          <option [ngValue]="2">Bebê (3–12 meses)</option>
          <option [ngValue]="3">Primeira infância (1–3 anos)</option>
          <option [ngValue]="4">Infantil (4–7 anos)</option>
          <option [ngValue]="5">Juvenil (8–14 anos)</option>
          <option [ngValue]="6">Adulto (15+ anos)</option>
        </select>
      </div>

      <div class="campo">
        <label for="imagem">URL da Imagem (opcional)</label>
        <input type="text" id="imagem" name="imagem" placeholder="https://exemplo.com/imagem.jpg" [(ngModel)]="produto.imagem">
      </div>

      <button type="button" (click)="cadastrar()">
        CADASTRAR PRODUTO
      </button>
    </form>
  </div>
</main>
