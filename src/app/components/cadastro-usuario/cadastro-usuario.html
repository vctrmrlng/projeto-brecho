<app-header></app-header>

<main class="container">
  <div class="cadastro-container">
    <p class="cadastro-subtitle">BEM-VINDO À SEGUNDA CHANCE</p>
    <h2>Cadastro de Usuário</h2>

    <form>
      <div class="campo">
        <label for="nome">NOME</label>
        <input type="text" id="nome" name="nome" [(ngModel)]="usuario.nome">
      </div>

      <div class="campo">
        <label for="cpf">CPF (só os números)</label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="11" required [(ngModel)]="usuario.cpf">
      </div>

      <div class="campo">
        <label for="telefone">TELEFONE (com ddd)</label>
        <input type="tel" id="telefone" name="telefone" maxlength="11" required [(ngModel)]="usuario.telefone">
      </div>

      <div class="campo">
        <label for="email">EMAIL</label>
        <input type="email" id="email" name="email" required [(ngModel)]="usuario.email">
      </div>

      <div class="campo">
        <label for="chavePix">CHAVE PIX</label>
        <input type="text" id="chavePix" name="chavePix" [(ngModel)]="usuario.chavePix">
      </div>

      <div class="campo">
        <label for="senha">SENHA</label>
        <input type="password" id="senha" name="senha" minlength="8" required [(ngModel)]="usuario.senha">
      </div>

      <div class="campo">
        <label for="confirmarSenha">CONFIRMAR SENHA</label>
        <input type="password" id="confirmarSenha" name="confirmarSenha" required [(ngModel)]="confirmarSenha">
      </div>

      <button type="button" (click)="cadastrar()">
        CADASTRAR
      </button>
    </form>
  </div>
</main>
