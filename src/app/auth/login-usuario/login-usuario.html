<div class="login-container">

  <h2>Login</h2>

  <form (ngSubmit)="entrar()">

    <div class="campo">
      <label>E-mail</label>

      <input
        type="email"
        [(ngModel)]="email"
        name="email"
        placeholder="Digite seu e-mail"
        required>
    </div>

    <div class="campo">
      <label>Senha</label>

      <input
        type="password"
        [(ngModel)]="senha"
        name="senha"
        placeholder="Digite sua senha"
        required>
    </div>

    <button type="submit">
      Entrar
    </button>

  </form>

  <p>
    Ainda não possui conta?
    <a routerLink="/cadastro-usuario">
      Cadastre-se
    </a>
  </p>

</div>
